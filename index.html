<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mapa procesu diagnostycznego</title>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#viewer {
    width: 100vw;
    height: 100vh;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

</head>

<body>

<object
    id="viewer"
    data="diagnostyka.svg"
    type="image/svg+xml">
</object>

<script>

document
.getElementById("viewer")
.addEventListener("load", function () {

    svgPanZoom(
        this.contentDocument.querySelector("svg"),
        {
            zoomEnabled: true,
            controlIconsEnabled: true,
            fit: true,
            center: true,
            minZoom: 0.1,
            maxZoom: 50
        }
    );

});

</script>

</body>
</html>
